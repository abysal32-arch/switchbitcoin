# Swap Key signed-manifest authoring input — VERSION 2 (Task 27, the first
# REAL governance round).
#
# v2 carries ONE parameter change from v1, an owner decision (Joe,
# 2026-07-16, recorded in params-governance.md): the onboarding decorrelation
# delay drops from 24–72 h to **1–2 h for the testnet TESTING PERIOD**, so
# timing gates stop stalling test cycles (the task-25 rehearsal lost ~2 days
# to maturity waits). The delay stays >0 and randomized per coin, so every
# mechanic it gates — per-coin draws, dual wall+height anchoring, the
# `status` maturity annotation, the premature-swap refusal — remains
# exercised, on an hour scale. The production-scale delay is restored in the
# first post-testing round. All fee/timelock params are UNCHANGED (task 26's
# calibration: live leg-2 values matched the baked baselines exactly).
#
# `onboarding_delay_hours` is a Params field → digest-relevant → a v1 peer
# refuses a v2 peer at the hello (the DECISION-5 staggered state this round
# drills live). Already-anchored coins keep their written delays (write-once).
#
# Signed 2026-07-16 with the SECOND operator key (x-only pubkey
# fedd62229b6c8a194d6d174d68ad0ce303623cbd49df4b968b9b06ea9e6ec7fe =
# PINNED_OPERATOR_XONLY since the same-day re-pin): the first key's reseal
# passphrase was lost and the documented key-loss rotation ran for real —
# keygen → re-pin → rebuild (params-governance.md "Key management"). v1
# (signed by the retired key) no longer verifies under the new pin; wallets
# fall back to the identical compiled baseline until they ingest this v2.
# Envelope: v2.manifest.
#
# Usage:   swapkey-manifest sign v2-params.toml --key <operator.key> --out v2.manifest
# Check:   swapkey-manifest compose-check v2-params.toml   (no key needed)

